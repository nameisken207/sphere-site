<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; overflow: hidden; background: #f5f5f5; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, group;
let isDragging = false;
let prev = { x: 0, y: 0 };
let velocity = { x: 0, y: 0 };

init();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 0.1;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  group = new THREE.Group();
  scene.add(group);

  animate();
}

// receive CMS data
window.addEventListener("message", (event) => {
  const items = event.data;

  // repeat items to fill
  const repeated = [];
  const targetCount = 60;

  for (let i = 0; i < targetCount; i++) {
    repeated.push(items[i % items.length]);
  }

  createSphere(repeated);
});

function createSphere(items) {
  const radius = 6;
  const loader = new THREE.TextureLoader();

  items.forEach((item, i) => {
    const phi = Math.acos(-1 + (2 * i) / items.length);
    const theta = Math.sqrt(items.length * Math.PI) * phi;

    const x = radius * Math.cos(theta) * Math.sin(phi);
    const y = radius * Math.sin(theta) * Math.sin(phi);
    const z = radius * Math.cos(phi);

    const texture = loader.load(item);

    const geo = new THREE.PlaneGeometry(1.2, 1.6);
    const mat = new THREE.MeshBasicMaterial({
      map: texture,
      side: THREE.DoubleSide
    });

    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.set(x, y, z);
    mesh.lookAt(0, 0, 0);

    group.add(mesh);
  });
}

// drag interaction
document.addEventListener("mousedown", (e) => {
  isDragging = true;
  prev.x = e.clientX;
  prev.y = e.clientY;
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;

  velocity.x = dx * 0.0005;
  velocity.y = dy * 0.0005;

  group.rotation.y += velocity.x * 5;
  group.rotation.x += velocity.y * 5;

  prev.x = e.clientX;
  prev.y = e.clientY;
});

// animation loop
function animate() {
  requestAnimationFrame(animate);

  // slow auto rotation
  group.rotation.y += 0.0008;

  // inertia
  group.rotation.y += velocity.x;
  group.rotation.x += velocity.y;

  velocity.x *= 0.95;
  velocity.y *= 0.95;

  renderer.render(scene, camera);
}

// resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
