<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; overflow: hidden; background: #ffffff; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, group;
let isDragging = false;
let prev = { x: 0, y: 0 };
let velocity = { x: 0, y: 0 };

init();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 0.1;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  group = new THREE.Group();
  scene.add(group);

  animate();
}

// receive CMS data
window.addEventListener("message", (event) => {
  const items = event.data;

  const repeated = [];
  const targetCount = 60;

  for (let i = 0; i < targetCount; i++) {
    repeated.push(items[i % items.length]);
  }

  createSphere(repeated);
});

function createSphere(items) {
  const radius = 5.3; // tighter spacing
  const loader = new THREE.TextureLoader();

  const rows = 6;
  const cols = 10;

  items.forEach((item, i) => {
    const row = Math.floor(i / cols);
    const col = i % cols;

    const phi = (row / (rows - 1)) * Math.PI;
    const theta = (col / cols) * Math.PI * 2;

    const x = radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);

    const texture = loader.load(item);

    // --- CARD BACKGROUND ---
    const bgGeo = new THREE.PlaneGeometry(1.3, 1.3);
    const bgMat = new THREE.MeshBasicMaterial({
      color: 0xF9F9F9,
      side: THREE.DoubleSide
    });
    const bg = new THREE.Mesh(bgGeo, bgMat);

    // --- IMAGE ---
    const imgGeo = new THREE.PlaneGeometry(1.1, 1.1);
    const imgMat = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      side: THREE.DoubleSide
    });
    const img = new THREE.Mesh(imgGeo, imgMat);

    img.position.z = 0.01;
    bg.add(img);

    bg.position.set(x, y, z);
    bg.lookAt(0, 0, 0);

    group.add(bg);
  });
}

// drag interaction
document.addEventListener("mousedown", (e) => {
  isDragging = true;
  prev.x = e.clientX;
  prev.y = e.clientY;
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;

  velocity.x = dx * 0.0005;
  velocity.y = dy * 0.0005;

  group.rotation.y += velocity.x * 5;
  group.rotation.x += velocity.y * 5;

  prev.x = e.clientX;
  prev.y = e.clientY;
});

// animation loop
function animate() {
  requestAnimationFrame(animate);

  // slow auto rotation
  group.rotation.y += 0.0008;

  // inertia
  group.rotation.y += velocity.x;
  group.rotation.x += velocity.y;

  velocity.x *= 0.95;
  velocity.y *= 0.95;

  renderer.render(scene, camera);
}

// resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
